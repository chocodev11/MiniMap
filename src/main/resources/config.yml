pack:
  pipeline:
    contentsDir: "contents"
    outputDir: "output"
    generatedZipName: "generated.zip"
    exportUncompressed: true
    generateDefaults: true
    overwriteDefaults: true
    packFormat: 75
    description: "MiniMap PoC Pack"

  host:
    bind: "0.0.0.0"
    port: 8085
    publicBaseUrl: ""
    path: "minimap-pack.zip"
    force: true
    prompt: "MiniMap PoC resource pack"

hud:
  pipeline:
    mode: "modern"
    debugShader: false

  updateIntervalTicks: 1
  layout: "{nw}{ne}{sw}{se}{border}{marker}"

  map:
    centerX: 0.0
    centerZ: 0.0
    radiusBlocks: 256.0
    leftOrRight: "left"
    pan:
      invert: false
    rotation:
      invertYaw: false
      offsetDegrees: 180.0
      smoothing:
        enabled: true
        alpha: 0.5

  glyphs:
    nw: "\\uE101"
    ne: "\\uE102"
    sw: "\\uE103"
    se: "\\uE104"
    border: "\\uE105"
    marker: "\\uE106"
